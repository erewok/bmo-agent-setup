# Secure/Restricted BMO Configuration - Maximum safety for sensitive environments

[core]
thinking-enabled = true
fast-mode = false

[statusline]
enabled = true

[permissions]
# Default permission mode: "acceptEdits", "bypassPermissions", "default", "dontAsk", "plan", "auto"
default-mode = "default"

# Very restrictive - only allow reading
allow = [
    "Read(src/**)",
    "Read(tests/**)",
    "Read(docs/**)",
    "Bash(bmo *)",
    "Bash(jq *)",
]

# Require approval for all modifications
ask = [
    "Write",
    "Bash",
]

# Explicitly deny dangerous operations
deny = [
    # Write: block all paths outside the project
    "Write(//**)",
    "Write(~/.ssh/**)",
    "Write(~/.aws/**)",
    "Write(~/.config/**)",
    # Read: credential files - deny wins over the scoped allow rules above
    "Read(~/.ssh/**)",
    "Read(~/.aws/**)",
    "Read(~/.config/gh/**)",
    "Read(~/.netrc)",
    "Read(~/.npmrc)",
    "Read(~/.docker/config.json)",
    "Read(~/.kube/config)",
    "Bash(rm *)",
    "Bash(sudo *)",
    "Bash(bmo truncate *)",
]

[sandbox]
enabled = true
auto-allow-bash = false
allow-unsandboxed-commands = false

[sandbox.network]
# Only allow essential domains
allowed-domains = [
    "api.anthropic.com",
]

allow-local-binding = false

[mcp]
enable-all-project-servers = false
# Only explicitly approved servers
enabled-servers = []
